<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>포커 핸드 로거 v35</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .section-title { border-bottom: 2px solid #4B5563; padding-bottom: 8px; margin-bottom: 16px; }
    .btn { transition: all 0.2s ease-in-out; }
    .btn:active { transform: scale(0.95); }
    .btn:disabled { background-color: #4B5563; cursor: not-allowed; opacity: 0.7; }
    .btn-selected { background-color: #FBBF24 !important; color: #111827 !important; font-weight: bold; }
    .card-placeholder { border: 2px dashed #4B5563; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 2px; background-color: rgba(255,255,255,0.05); }
    .card-display { font-family: 'Roboto', sans-serif; background-color: white; border-radius: 4px; padding: 2px; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .modal { transition: opacity 0.3s ease; backdrop-filter: blur(4px); }
    .action-log-entry .player-winner { color: #FBBF24; font-weight: bold; }
    .action-log-entry .player-loser { color: #60A5FA; font-weight: bold; }
    .action-log-entry .player-neutral { color: #9CA3AF; font-weight: bold; }
    .card-selector-btn { font-family: 'Roboto', sans-serif; font-size: 1.25rem; font-weight: bold; }
    .card-selector-btn.card-red { color: #DC2626; }
    .card-selector-btn.card-black { color: #111827; }
    .card-selector-btn.selected { border: 3px solid #FBBF24; transform: scale(0.95); }
    .keypad-btn:active { background-color: #FBBF24; color: #111827; }
    .player-card { border: 2px solid #374151; }
    .player-card.is-winner { border-color: #FBBF24; box-shadow: 0 0 10px #FBBF24; }
    .player-card.is-loser { border-color: #60A5FA; box-shadow: 0 0 10px #60A5FA; }
    .input-with-keypad { display: flex; align-items: center; gap: 4px; }
    .input-with-keypad input { height: 42px; flex-grow: 1; min-width: 50px; }
    .keypad-icon-btn { flex-shrink: 0; height: 42px; width: 48px; }
    .player-card h3 { cursor: move; }
    .player-card.is-folded { opacity: 0.5; background-color: #1f2937; }
  </style>
</head>
<body class="bg-gray-900 text-white p-2 sm:p-4 antialiased">
  <div id="app" class="max-w-4xl mx-auto">
    <header class="text-center mb-4">
      <h1 class="text-3xl font-bold text-amber-400">포커 핸드 로거</h1>
      <p id="version-display" class="text-gray-400">v35: 핸드 관리 기능 개선</p>
    </header>

    <!-- Hand Info Section -->
    <div class="bg-gray-800 p-4 rounded-lg mb-4">
      <h2 class="text-xl font-bold section-title flex justify-between items-center">
        <span>1. 핸드 정보 기록</span>
        <div class="flex items-center gap-2">
          <button id="manage-players-btn" class="btn bg-gray-600 p-2 rounded-md text-sm">테이블/플레이어 관리</button>
          <button id="refresh-data" class="text-2xl" title="데이터 새로고침">🔄</button>
        </div>
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <h3 class="text-lg font-semibold mb-2">핸드 번호</h3>
          <div class="flex items-center gap-2">
            <div id="hand-number-display" class="text-xl font-bold bg-gray-700 p-2 rounded-md flex-grow text-center"></div>
            <button id="load-hand-btn" class="btn bg-gray-600 p-2 rounded-md">불러오기</button>
          </div>
        </div>
        <div>
          <label for="table-selector" class="block text-sm font-medium text-gray-300 mb-2">테이블 선택:</label>
          <select id="table-selector" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2">
            <option value="">-- 테이블을 선택하세요 --</option>
          </select>
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-300 mb-2">참여 플레이어 선택 (클릭 순서대로 자리 배정):</label>
          <div id="player-selection-buttons" class="flex flex-wrap gap-2 min-h-[40px] items-center"></div>
        </div>
        <div>
          <label for="timezone-selector" class="block text-sm font-medium text-gray-300 mb-2">표준 시간대:</label>
          <div class="flex items-center gap-2">
            <select id="timezone-selector" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2"></select>
            <div id="time-display" class="bg-gray-900/50 p-2 rounded-md font-mono text-lg"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Player Details Section -->
    <div class="bg-gray-800 p-4 rounded-lg mb-4">
      <h2 class="text-xl font-bold section-title">2. 플레이어 상세 정보 (드래그하여 순서 변경)</h2>
      <div id="player-details-section" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <!-- Action Logger Section -->
    <div id="action-logger-section" class="bg-gray-800 p-4 rounded-lg mt-4">
      <h2 class="text-xl font-bold mb-4 section-title">3. 액션 기록</h2>
      <div class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <h3 class="text-lg font-semibold mb-2">블라인드</h3>
            <div class="flex items-end gap-2">
              <div class="flex-1">
                <label class="text-sm text-gray-400">SB</label>
                <div class="input-with-keypad">
                  <input type="text" id="small-blind-input" class="number-input w-full bg-gray-700 p-2 rounded-md text-lg" />
                  <button class="keypad-icon-btn btn bg-gray-600 p-2 rounded-md">⌨️</button>
                </div>
              </div>
              <div class="flex-1">
                <label class="text-sm text-gray-400">BB</label>
                <div class="input-with-keypad">
                  <input type="text" id="big-blind-input" class="number-input w-full bg-gray-700 p-2 rounded-md text-lg" />
                  <button class="keypad-icon-btn btn bg-gray-600 p-2 rounded-md">⌨️</button>
                </div>
              </div>
              <div class="flex items-center pb-1">
                <input id="bb-ante-checkbox" type="checkbox" class="h-5 w-5 bg-gray-700 border border-gray-600 rounded text-amber-500 focus:ring-amber-600" />
                <label for="bb-ante-checkbox" class="ml-2 text-sm text-gray-300">BB Ante</label>
              </div>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">보드 카드:</label>
            <div id="board-card-placeholders" class="flex flex-wrap gap-2"></div>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="street-logs-container"></div>
      </div>
    </div>

    <!-- Winner Selection Section -->
    <div class="bg-gray-800 p-4 rounded-lg mt-4">
      <h2 class="text-xl font-bold section-title">4. 승자 선택 (Split Pot 가능)</h2>
      <div id="winner-buttons" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Finalize & Output Section -->
    <div class="bg-gray-800 p-4 rounded-lg mt-4">
      <h2 class="text-xl font-bold mb-4 section-title">5. 전송 및 초기화</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <button id="send-to-sheet-btn" class="w-full btn bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md text-lg">시트에 자동 입력</button>
        <button id="reset-all" class="w-full btn bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-md text-lg">새 핸드 기록</button>
      </div>
      <p id="feedback-message" class="text-center mt-2 h-5 font-semibold"></p>
    </div>

    <!-- Log Section -->
    <div class="bg-gray-800 p-4 rounded-lg mt-4">
      <h2 class="text-xl font-bold mb-4 section-title">로딩 로그</h2>
      <div id="log-display" class="bg-gray-900/50 p-3 rounded-md min-h-[100px] max-h-[200px] overflow-y-auto text-sm font-mono"></div>
    </div>
  </div>

  <!-- Modals -->
  <div id="card-selector-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-2 sm:p-4 z-50 hidden opacity-0"></div>
  <div id="action-pad-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 hidden opacity-0"></div>
  <div id="keypad-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 hidden opacity-0"></div>
  <div id="load-hand-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 hidden opacity-0"></div>
  <div id="registration-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 hidden opacity-0"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let timeUpdater;
      const state = {
        dataSheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSDY_i4330JANAjIz4sMncdJdRHsOkfUCjQusHTGQk2tykrhA4d09LeIp3XRbLd8hkN6SgSB47k_nux/pub?gid=998576925&single=true&output=csv',
        playerDataByTable: {},
        allTables: [],
        allHandNumbers: [],
        allHandData: {},
        selectedTable: null,
        playersInHand: [],
        board: [],
        actionState: {
          handNumber: '',
          smallBlind: '', bigBlind: '', hasBBAnte: false,
          preflop: [], flop: [], turn: [], river: [],
        },
        appsScriptUrl: 'https://script.google.com/macros/s/AKfycbyDmO5nnjx30Cy5bfJJFK94yI3OxALpkUIH4UGtX9cOV0VmIALb0WrpeFrDLfYLPlgF/exec',
        modalState: {
          cardTarget: null,
          keypadTarget: null,
          keypadPurpose: null,
          actionPadStreet: null,
          actionPadPlayer: null,
          actionPadCurrentAction: null,
        },
        selectedTimezone: 'Asia/Seoul'
      };

      const SUITS = { s: '♠', h: '♥', d: '♦', c: '♣' };
      const RANKS = ['A', 'K', 'Q', 'J', '10', '9', '8', '7', '6', '5', '4', '3', '2'];

      const el = {
        refreshDataBtn: document.getElementById('refresh-data'),
        tableSelector: document.getElementById('table-selector'),
        playerSelectionButtons: document.getElementById('player-selection-buttons'),
        boardCardPlaceholders: document.getElementById('board-card-placeholders'),
        playerDetailsSection: document.getElementById('player-details-section'),
        handNumberDisplay: document.getElementById('hand-number-display'),
        loadHandBtn: document.getElementById('load-hand-btn'),
        smallBlindInput: document.getElementById('small-blind-input'),
        bigBlindInput: document.getElementById('big-blind-input'),
        bbAnteCheckbox: document.getElementById('bb-ante-checkbox'),
        streetLogsContainer: document.getElementById('street-logs-container'),
        winnerButtons: document.getElementById('winner-buttons'),
        sendToSheetBtn: document.getElementById('send-to-sheet-btn'),
        resetBtn: document.getElementById('reset-all'),
        feedbackMessage: document.getElementById('feedback-message'),
        logDisplay: document.getElementById('log-display'),
        cardSelectorModal: document.getElementById('card-selector-modal'),
        actionPadModal: document.getElementById('action-pad-modal'),
        keypadModal: document.getElementById('keypad-modal'),
        loadHandModal: document.getElementById('load-hand-modal'),
        timezoneSelector: document.getElementById('timezone-selector'),
        timeDisplay: document.getElementById('time-display'),
        managePlayersBtn: document.getElementById('manage-players-btn'),
        registrationModal: document.getElementById('registration-modal'),
      };

      function logMessage(message, isError = false) {
        const logEntry = document.createElement('div');
        logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logEntry.className = isError ? 'text-red-400' : 'text-green-400';
        el.logDisplay.appendChild(logEntry);
        el.logDisplay.scrollTop = el.logDisplay.scrollHeight;
      }

      function getFormattedTimeInTimezone(date, timezone) {
        try {
          const options = { timeZone: timezone, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
          const formatter = new Intl.DateTimeFormat('en-US', options);
          const parts = formatter.formatToParts(date);
          const t = {};
          parts.forEach(({ type, value }) => { if (type !== 'literal') t[type] = value; });
          return `${t.hour}:${t.minute}:${t.second}`;
        } catch (e) {
          const pad = (n) => n.toString().padStart(2, '0');
          return `${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
        }
      }

      function populateTimezones() {
        const timezones = {
          "Asia/Seoul": "한국 (Asia/Seoul)",
          "Asia/Nicosia": "키프로스 (Asia/Nicosia)"
        };
        const selector = el.timezoneSelector;
        selector.innerHTML = '';
        for (const [value, text] of Object.entries(timezones)) {
          const option = document.createElement('option');
          option.value = value; option.textContent = text;
          selector.appendChild(option);
        }
        selector.value = state.selectedTimezone;
      }

      function updateTimeDisplay() {
        el.timeDisplay.textContent = getFormattedTimeInTimezone(new Date(), state.selectedTimezone);
      }

      async function loadDataFromGoogleSheet() {
        logMessage('초기 데이터 로딩 시작...');
        logMessage(`요청 URL: ${state.appsScriptUrl}?action=getInitialData`);
        try {
          const response = await fetch(`${state.appsScriptUrl}?action=getInitialData`);
          logMessage('구글 시트로부터 응답 수신 중...');
          if (!response.ok) {
            logMessage(`서버 응답 오류: 상태 코드 ${response.status}`, true);
            throw new Error(`서버 응답 오류: ${response.status}`);
          }
          logMessage('서버 응답 성공 (상태 코드 200).');

          let data;
          try {
            data = await response.json();
            logMessage('JSON 데이터 파싱 성공.');
          } catch (jsonError) {
            logMessage('JSON 파싱 실패. 응답이 비어있거나 형식이 잘못되었을 수 있습니다.', true);
            throw new Error('JSON 파싱 실패');
          }

          if (data.error) {
            logMessage(`Apps Script 에러: ${data.error}`, true);
            throw new Error(data.error);
          }

          state.playerDataByTable = data.playerData;
          state.allTables = Object.keys(data.playerData).sort();
          state.allHandData = data.handData;
          state.allHandNumbers = Object.keys(data.handData).map(n => parseInt(n, 10)).sort((a, b) => a - b);
          logMessage(`테이블 ${state.allTables.length}개, 핸드 ${state.allHandNumbers.length}개 로딩 완료.`);
        } catch (error) {
          console.error('Failed to load initial data:', error);
          logMessage(`초기 데이터 로딩 실패: ${error.message}`, true);
          if (error.message.includes('Failed to fetch')) {
            logMessage('팁: 이 오류는 보통 Apps Script 배포 설정 문제(CORS)로 발생합니다. 배포 설정을 확인해주세요.', true);
          }
        }
      }

      function renderTableSelection() {
        const selector = el.tableSelector;
        selector.innerHTML = '<option value="">-- 테이블을 선택하세요 --</option>';
        state.allTables.forEach(tableName => {
          const option = document.createElement('option');
          option.value = tableName; option.textContent = tableName;
          selector.appendChild(option);
        });
      }

      function renderPlayerSelection() {
        if (!state.selectedTable) {
          el.playerSelectionButtons.innerHTML = '<p class="text-gray-400">테이블을 먼저 선택해주세요.</p>';
          return;
        }
        const playersForTable = state.playerDataByTable[state.selectedTable] || [];
        el.playerSelectionButtons.innerHTML = playersForTable.map(playerData => {
          const isSelected = state.playersInHand.some(p => p.name === playerData.name);
          const cls = isSelected ? 'btn-selected' : 'bg-gray-600 hover:bg-gray-500';
          // 버튼은 단순 텍스트만 삽입
          return `<button class="btn ${cls} px-3 py-1 rounded-md" data-player-name="${playerData.name}">${playerData.name}</button>`;
        }).join('');
      }

      function renderPlayerDetails() {
        el.playerDetailsSection.innerHTML = state.playersInHand.map(p => {
          let roleClass = '';
          if (p.role === 'winner') roleClass = 'is-winner';
          if (p.hasFolded) roleClass += ' is-folded';
          const handHTML = (p.hand && p.hand.length > 0) ? p.hand.map(formatCardDisplay).join('') : '<span class="text-gray-400 text-2xl">+</span>';
          return `
          <div class="player-card bg-gray-700 p-3 rounded-lg ${roleClass}" data-player-name="${p.name}" draggable="true">
            <h3 class="text-lg font-bold mb-2">${p.name}</h3>
            <div class="input-with-keypad mb-2">
              <input type="text" class="number-input player-chip-input w-full bg-gray-600 border border-gray-500 rounded-md p-1" placeholder="시작 칩" value="${formatNumber(p.chips)}" />
              <button class="keypad-icon-btn btn bg-gray-600 p-2 rounded-md">⌨️</button>
            </div>
            <div class="card-placeholder h-16 flex justify-center items-center gap-2 mb-2" data-player-name="${p.name}" data-count="2">
              ${handHTML}
            </div>
          </div>`;
        }).join('');
      }

      function renderBoard() {
        const flopHTML = `<div class="card-placeholder h-16 flex-grow" data-target="board" data-index="0" data-count="3">
          ${[0,1,2].map(i => state.board[i] ? formatCardDisplay(state.board[i]) : '<span class="text-gray-400 text-2xl">+</span>').join('')}
        </div>`;
        const turnHTML = `<div class="card-placeholder h-16 w-12" data-target="board" data-index="3" data-count="1">
          ${state.board[3] ? formatCardDisplay(state.board[3]) : '<span class="text-gray-400 text-2xl">+</span>'}
        </div>`;
        const riverHTML = `<div class="card-placeholder h-16 w-12" data-target="board" data-index="4" data-count="1">
          ${state.board[4] ? formatCardDisplay(state.board[4]) : '<span class="text-gray-400 text-2xl">+</span>'}
        </div>`;
        el.boardCardPlaceholders.innerHTML = flopHTML + turnHTML + riverHTML;
      }

      function renderActionStreets() {
        const streets = ['preflop','flop','turn','river'];
        let cumulativePot = 0;
        el.streetLogsContainer.innerHTML = streets.map(street => {
          const streetActions = state.actionState[street];
          let streetPot = 0;
          if (street === 'preflop') {
            streetPot += parseInt(unformatNumber(state.actionState.smallBlind) || 0, 10);
            streetPot += parseInt(unformatNumber(state.actionState.bigBlind) || 0, 10);
            if (state.actionState.hasBBAnte) {
              streetPot += parseInt(unformatNumber(state.actionState.bigBlind) || 0, 10);
            }
          }
          streetActions.forEach(action => {
            if (action.amount) streetPot += parseInt(unformatNumber(action.amount), 10);
          });
          cumulativePot += streetPot;

          const status = getStreetStatus(street);
          const isStreetClosed = status.isActionClosed;

          return `
          <div class="street-container">
            <div class="flex justify-between items-center mb-2">
              <h3 class="text-lg font-semibold">${street.charAt(0).toUpperCase() + street.slice(1)}</h3>
              <div class="flex items-center gap-2">
                <span class="text-sm text-amber-400 font-mono">Pot: ${formatNumber(cumulativePot)}</span>
                <button class="pot-keypad-btn btn bg-gray-600 p-1 rounded-md text-xs" data-street="${street}" data-current-pot="${cumulativePot}">⌨️</button>
              </div>
            </div>
            <div id="${street}-log" class="action-log-display bg-gray-900/50 p-3 rounded-md min-h-[80px] mb-2"></div>
            <div class="flex gap-2">
              <button class="add-action-btn btn flex-grow bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md" data-street="${street}" ${isStreetClosed ? 'disabled' : ''}>액션 추가</button>
              <button class="clear-street-btn btn bg-gray-600 hover:bg-gray-500 py-2 px-3 rounded-md" data-street="${street}">초기화</button>
            </div>
          </div>`;
        }).join('');
        renderActionLogs();
      }

      function renderActionLogs() {
        ['preflop','flop','turn','river'].forEach(street => {
          const logContainer = document.getElementById(`${street}-log`);
          if (!logContainer) return;
          logContainer.innerHTML = state.actionState[street].map(log => {
            const player = state.playersInHand.find(p => p.name === log.player);
            let playerClass = 'player-neutral';
            if (log.action === 'Pot Correction') {
              playerClass = 'text-yellow-400';
            } else if (player?.role === 'winner') {
              playerClass = 'player-winner';
            }
            const amountText = log.amount ? ` <span class="font-mono">${formatNumber(log.amount)}</span>` : '';
            const timecode = log.timestamp ? getFormattedTimeInTimezone(new Date(log.timestamp), state.selectedTimezone) : '';
            const timecodeHTML = timecode ? `<span class="text-xs text-gray-500 ml-2 font-mono">${timecode}</span>` : '';
            return `<div class="action-log-entry"><div><span class="${playerClass}">${log.player || ''}</span> ${log.action}${amountText}</div>${timecodeHTML}</div>`;
          }).join('');
        });
      }

      function renderWinnerSelection() {
        const activePlayers = state.playersInHand.filter(p => !p.hasFolded);
        el.winnerButtons.innerHTML = activePlayers.map(p => {
          const isSelected = p.role === 'winner';
          return `<button class="btn ${isSelected ? 'btn-selected' : 'bg-gray-600 hover:bg-gray-500'} px-3 py-1 rounded-md set-winner-btn" data-player-name="${p.name}">${p.name}</button>`;
        }).join('');
      }

      function formatCardDisplay(cardId) {
        if (!cardId) return '';
        const rank = cardId.slice(0, -1);
        const suitKey = cardId.slice(-1);
        const colorClass = (suitKey === 'h' || suitKey === 'd') ? 'text-red-400' : 'text-black';
        return `<div class="card-display h-full w-12 ${colorClass}"><div class="font-bold text-xl">${rank}</div><div>${SUITS[suitKey]}</div></div>`;
      }

      function formatCardForGfx(cardId) { return cardId; }

      function renderAll() {
        renderPlayerSelection();
        renderPlayerDetails();
        renderBoard();
        renderActionStreets();
        renderWinnerSelection();
      }

            deckHTML += `<button class="btn card-selector-btn rounded-md w-10 h-12 sm:w-12 sm:h-14 flex-shrink-0 ${isUsed ? 'bg-gray-600 text-gray-500 cursor-not-allowed' : 'bg-white hover:bg-amber-300'} ${colorClass}" data-card-id="${cardId}" ${isUsed ? 'disabled' : ''}>${rank}${SUITS[suitKey]}</button>`;

        const content = `

        };

      function getStreetStatus(street) {
        const streetActions = state.actionState[street];
        const activePlayers = state.playersInHand.filter(p => !p.hasFolded);

        if (activePlayers.length <= 1) {
          return { isActionClosed: true, betToCall: 0, playerInvestments: {} };
        }

        let betToCall = 0;
        let lastAggressor = null;
        const playerInvestments = {};
        activePlayers.forEach(p => playerInvestments[p.name] = 0);

        if (street === 'preflop') {
          // 가정: playersInHand[1] = SB, [2] = BB (현 로직 유지)
          const sbPlayer = state.playersInHand[1];
          const bbPlayer = state.playersInHand[2];
          const sbAmount = parseInt(unformatNumber(state.actionState.smallBlind) || 0);
          const bbAmount = parseInt(unformatNumber(state.actionState.bigBlind) || 0);
          if (sbPlayer) playerInvestments[sbPlayer.name] = sbAmount;
          if (bbPlayer) playerInvestments[bbPlayer.name] = bbAmount;
          betToCall = bbAmount;
          lastAggressor = bbPlayer;
        }

        streetActions.forEach(action => {
          if (action.amount) playerInvestments[action.player] = (playerInvestments[action.player] || 0) + parseInt(unformatNumber(action.amount), 10);
          if (['Bets','Raises'].includes(action.action)) {
            betToCall = playerInvestments[action.player];
            lastAggressor = state.playersInHand.find(p => p.name === action.player);
          }
        });

        let numPlayersActedSinceAggression = 0;
        let aggressionIndex = -1;
        for (let i = streetActions.length - 1; i >= 0; i--) {
          if (['Bets','Raises'].includes(streetActions[i].action)) { aggressionIndex = i; break; }
        }
        if (aggressionIndex !== -1) {
          for (let i = aggressionIndex + 1; i < streetActions.length; i++) numPlayersActedSinceAggression++;
        } else {
          numPlayersActedSinceAggression = streetActions.length;
        }

        const allBetsMatched = activePlayers.every(p => (playerInvestments[p.name] === betToCall) || p.isAllIn);

        if (allBetsMatched && streetActions.length > 0) {
          const lastAction = streetActions[streetActions.length - 1];
          if (lastAction.action === 'Checks' && numPlayersActedSinceAggression === activePlayers.length) {
            return { isActionClosed: true, betToCall, playerInvestments };
          }
          if (lastAction.action === 'Calls') {
            const lastAggressorStillIn = activePlayers.find(p => p === lastAggressor);
            if (!lastAggressorStillIn) return { isActionClosed: true, betToCall, playerInvestments };
            const lastAggressorHasActed = streetActions.slice(aggressionIndex + 1).find(a => a.player === lastAggressor.name);
            if (lastAggressorHasActed) return { isActionClosed: true, betToCall, playerInvestments };
          }
        }

        const playersWhoCanStillAct = activePlayers.filter(p => (playerInvestments[p.name] || 0) < betToCall);
        if (playersWhoCanStillAct.length === 0 && allBetsMatched && streetActions.length > 0) {
          if (street === 'preflop' && betToCall === parseInt(unformatNumber(state.actionState.bigBlind), 10) && lastAggressor === state.playersInHand[2]) {
            if (streetActions.find(a => a.player === lastAggressor.name && ['Checks','Raises'].includes(a.action))) {
              return { isActionClosed: true, betToCall, playerInvestments };
            }
          } else if (betToCall > 0) {
            return { isActionClosed: true, betToCall, playerInvestments };
          }
        }

        return { isActionClosed: false, betToCall, playerInvestments };
      }

      function getNextPlayerToAct(street) {
        const activePlayers = state.playersInHand.filter(p => !p.hasFolded && !p.isAllIn);
        if (activePlayers.length < 1) return null;

        const streetActions = state.actionState[street];
        if (streetActions.length === 0) {
          let startIndex = 0;
          if (street === 'preflop') {
            startIndex = state.playersInHand.length > 2 ? 3 % state.playersInHand.length : 0;
          } else {
            for (let i = 0; i < state.playersInHand.length; i++) {
              if (!state.playersInHand[i].hasFolded) { startIndex = i; break; }
            }
          }
          for (let i = 0; i < state.playersInHand.length; i++) {
            const player = state.playersInHand[(startIndex + i) % state.playersInHand.length];
            if (player && !player.hasFolded && !player.isAllIn) return player;
          }
        }

        const lastActionPlayerName = streetActions[streetActions.length - 1].player;
        const lastPlayerIndex = state.playersInHand.findIndex(p => p.name === lastActionPlayerName);
        for (let i = 1; i <= state.playersInHand.length; i++) {
          const nextIndex = (lastPlayerIndex + i) % state.playersInHand.length;
          const nextPlayer = state.playersInHand[nextIndex];
          if (nextPlayer && !nextPlayer.hasFolded && !nextPlayer.isAllIn) return nextPlayer;
        }
        return null;
      }

      function openActionPad(street) {
        const status = getStreetStatus(street);
        if (status.isActionClosed) {
          showFeedback(`${street} 액션이 종료되었습니다.`);
          renderActionStreets();
          return;
        }
        const nextPlayer = getNextPlayerToAct(street);
        if (!nextPlayer) { renderActionStreets(); return; }

        state.modalState.actionPadStreet = street;
        state.modalState.actionPadPlayer = nextPlayer.name;

        const playerInvestment = status.playerInvestments[nextPlayer.name] || 0;
        const amountToCall = status.betToCall - playerInvestment;
        const hasBet = status.betToCall > (street === 'preflop' ? parseInt(unformatNumber(state.actionState.bigBlind), 10) : 0);

        let buttonsHTML = '';

          buttonsHTML += `<button class="btn bg-blue-600 hover:bg-blue-700 p-3 rounded-md" data-action="Calls" data-amount="${amountToCall}">Call ${formatNumber(amountToCall)}</button>`;
          buttonsHTML += `<button class="btn bg-amber-500 hover:bg-amber-600 p-3 rounded-md" data-action="Raises">Raise</button>`;
        } else {
          buttonsHTML += `<button class="btn bg-gray-600 hover:bg-gray-500 p-3 rounded-md" data-action="Checks">Check</button>`;
          buttonsHTML += `<button class="btn bg-amber-500 hover:bg-amber-600 p-3 rounded-md" data-action="Bets">Bet</button>`;
        }
        buttonsHTML += `<button class="btn bg-red-800 hover:bg-red-700 p-3 rounded-md font-bold" data-action="All In">ALL IN</button>`;

        const content = `

      function loadHandData(handNumber) {
        const handDataForNumber = state.allHandData[handNumber];
        if (!handDataForNumber) { showFeedback(`${handNumber}번 핸드 데이터를 찾을 수 없습니다.`, true); return; }

        const handRows = Array.isArray(handDataForNumber) ? handDataForNumber : Object.values(handDataForNumber);
        const tempState = {
          playersInHand: [],
          board: [],
          actionState: {
            handNumber: handNumber.toString(),
            smallBlind: '', bigBlind: '', hasBBAnte: false,
            preflop: [], flop: [], turn: [], river: [],
          },
          selectedTable: null
        };

        const handInfoRow = handRows.find(row => row && row[1] === 'HAND');
        if (handInfoRow) {
          tempState.actionState.hasBBAnte = handInfoRow[5] === 'BB_ANTE';
          tempState.actionState.smallBlind = handInfoRow[8];
          tempState.actionState.bigBlind = handInfoRow[9];
        }

        const playerRows = handRows.filter(row => row && row[1] === 'PLAYER');
        playerRows.forEach(row => {
          const name = row[2];
          const seat = row[3];
          const initialChips = row[5];
          const endChips = row[6];
          const hand = (row[7] && row[7].length > 0) ? row[7].split(' ').filter(c => c) : [];
          const role = parseInt(endChips, 10) > parseInt(initialChips, 10) ? 'winner' : null;
          tempState.playersInHand.push({ name, seat, hand, chips: initialChips, initialChips, role, hasFolded: false });
        });

        if (tempState.playersInHand.length > 0) {
          const firstPlayerName = tempState.playersInHand[0].name;
          for (const tableName in state.playerDataByTable) {
            if (state.playerDataByTable[tableName].some(p => p.name === firstPlayerName)) {
              tempState.selectedTable = tableName; break;
            }
          }
        }

        let currentStreet = 'preflop';
        handRows.forEach(row => {
          if (!row) return;
          const type = row[1];
          // EVENT+BOARD 포맷도 허용
          if (type === 'BOARD' || (type === 'EVENT' && row[2] === 'BOARD')) {
            tempState.board.push(row[4]);
            if (tempState.board.length === 3) currentStreet = 'flop';
            else if (tempState.board.length === 4) currentStreet = 'turn';
            else if (tempState.board.length === 5) currentStreet = 'river';
          } else if (type === 'EVENT') {
            let action = row[2].replace(' TO','').replace('S','');
            action = action.charAt(0) + action.slice(1).toLowerCase() + 's';
            if (row[2] === 'RAISE TO') action = 'Raises';
            const playerSeat = row[3];
            const player = tempState.playersInHand.find(p => p.seat == playerSeat);
            if (player) {
              tempState.actionState[currentStreet].push({
                player: player.name, action, amount: row[4] || null, timestamp: null
              });
              if (action === 'Folds') {
                const pToFold = tempState.playersInHand.find(p => p.name === player.name);
                if (pToFold) pToFold.hasFolded = true;
              }
            }
          }
        });

        state.playersInHand = tempState.playersInHand;
        state.board = tempState.board;
        state.actionState = tempState.actionState;
        state.selectedTable = tempState.selectedTable;

        el.tableSelector.value = state.selectedTable || '';
        el.handNumberDisplay.textContent = `불러온 핸드 (#${handNumber})`;
        el.smallBlindInput.value = formatNumber(state.actionState.smallBlind);
        el.bigBlindInput.value = formatNumber(state.actionState.bigBlind);
        el.bbAnteCheckbox.checked = state.actionState.hasBBAnte;

        renderAll();
        saveActionState();
        logMessage(`${handNumber}번 핸드 데이터를 성공적으로 불러왔습니다.`);
      }

      function togglePlayerInHand(playerName) {
        const idx = state.playersInHand.findIndex(p => p.name === playerName);
        if (idx > -1) {
          state.playersInHand.splice(idx, 1);
        } else {
          const playersForTable = state.playerDataByTable[state.selectedTable] || [];
          const playerData = playersForTable.find(p => p.name === playerName);
          const initialChips = playerData ? playerData.chips : '';
          state.playersInHand.push({ name: playerName, hand: [], chips: initialChips, initialChips, role: null, hasFolded: false, isAllIn: false });
        }
        renderPlayerSelection();
        renderPlayerDetails();
        renderWinnerSelection();
      }

      function setPlayerRole(playerName) {
        const targetPlayer = state.playersInHand.find(p => p.name === playerName);
        if (!targetPlayer) return;
        targetPlayer.role = (targetPlayer.role === 'winner') ? null : 'winner';
        renderPlayerDetails();
        renderWinnerSelection();
      }

      function assignCard(cards) {
        const { target, player, index } = state.modalState.cardTarget;
        if (target === 'board') {
          cards.forEach((card, i) => state.board[index + i] = card);
          renderBoard();
        } else {
          const targetPlayer = state.playersInHand.find(p => p.name === player);
          if (targetPlayer) { targetPlayer.hand = cards; renderPlayerDetails(); }
        }
        closeModal(el.cardSelectorModal);
      }

      async function processNextAction(street) {
        const status = getStreetStatus(street);
        if (status.isActionClosed) {
          showFeedback(`${street} 액션이 종료되었습니다.`);
          renderActionStreets();
        } else {
          setTimeout(() => openActionPad(street), 100);
        }
      }

      function addActionToLog(action, amount = null) {
        const { actionPadStreet, actionPadPlayer } = state.modalState;
        const player = state.playersInHand.find(p => p.name === actionPadPlayer);
        if (!player) return;

        if (amount) {
          const currentChips = parseInt(unformatNumber(player.chips) || 0, 10);
          const amountToDeduct = parseInt(unformatNumber(amount), 10);
          player.chips = (currentChips - amountToDeduct).toString();
          if (parseInt(player.chips, 10) <= 0) player.isAllIn = true;
        }
        if (action === 'Folds') player.hasFolded = true;

        if (action === 'All In') {
          const remaining = unformatNumber(player.chips);
          player.isAllIn = true;
          player.chips = '0';
          amount = remaining; // 남은 칩 전부를 기록
        }

        state.actionState[actionPadStreet].push({
          player: actionPadPlayer,
          action,
          amount: amount ? amount.toString() : null,
          timestamp: new Date().toISOString()
        });

        closeModal(el.actionPadModal);
        closeModal(el.keypadModal);

        saveActionState();
        renderAll();
        processNextAction(actionPadStreet);
      }

      function clearStreetActions(street) {
        const actionsForStreet = state.actionState[street];
        actionsForStreet.forEach(action => {
          if (action.amount && action.player) {
            const player = state.playersInHand.find(p => p.name === action.player);
            if (player) {
              const currentChips = parseInt(unformatNumber(player.chips) || 0, 10);
              const amountToAddBack = parseInt(unformatNumber(action.amount), 10);
              player.chips = (currentChips + amountToAddBack).toString();
            }
          }
        });
        const foldedPlayerNamesThisStreet = actionsForStreet.filter(a => a.action === 'Folds').map(a => a.player);
        state.playersInHand.forEach(p => {
          if (foldedPlayerNamesThisStreet.includes(p.name)) p.hasFolded = false;
          p.isAllIn = false;
        });
        state.actionState[street] = [];
        saveActionState();
        renderAll();
      }

      function saveActionState() {
        localStorage.setItem('pokerActionState_v35', JSON.stringify(state.actionState));
      }
      function loadActionState() {
        const savedStateJSON = localStorage.getItem('pokerActionState_v35');
        if (savedStateJSON) state.actionState = { ...state.actionState, ...JSON.parse(savedStateJSON) };
      }

      function calculatePotSize() {
        let pot = 0;
        pot += parseInt(unformatNumber(state.actionState.smallBlind) || 0, 10);
        pot += parseInt(unformatNumber(state.actionState.bigBlind) || 0, 10);
        if (state.actionState.hasBBAnte) pot += parseInt(unformatNumber(state.actionState.bigBlind) || 0, 10);
        ['preflop','flop','turn','river'].forEach(street => {
          state.actionState[street].forEach(action => {
            if (action.amount) pot += parseInt(unformatNumber(action.amount), 10);
          });
        });
        return pot;
      }

      function generateGfxLogRows() {
        const finalRows = [];
        let rowCounter = 1;
        const addRow = (data) => {
          const padded = [...data];
          while (padded.length < 16) padded.push('');
          finalRows.push([rowCounter, ...padded]); rowCounter++;
        };

        const handStartTime = new Date();
        let currentTime = new Date(handStartTime.getTime());

        const playersWithSeats = state.playersInHand.map((p, i) => ({ ...p, seat: i + 1 }));
        const totalPot = calculatePotSize();
        const winners = playersWithSeats.filter(p => p.role === 'winner');
        const potPerWinner = winners.length > 0 ? Math.floor(totalPot / winners.length) : 0;
        const remainder = winners.length > 0 ? (totalPot % winners.length) : 0;

        addRow(['GAME','PokerGFX 3.111','FEATURE_TABLE']);
        addRow(['PAYOUTS']);

        const handLine = [
          'HAND',
          unformatNumber(state.actionState.handNumber) || '1',
          Math.floor(handStartTime.getTime() / 1000),
          'HOLDEM',
          state.actionState.hasBBAnte ? 'BB_ANTE' : 'NO_ANTE',
          unformatNumber(state.actionState.bigBlind) || 0,
          0,
          unformatNumber(state.actionState.smallBlind) || 0,
          unformatNumber(state.actionState.bigBlind) || 0,
          0,
          1,2,3,
          0,0,1
        ];
        addRow(handLine);

        playersWithSeats.forEach((p, i) => {
          let finalChips = parseInt(unformatNumber(p.chips) || 0, 10);
          if (p.role === 'winner' && !p.hasFolded) {
            finalChips += potPerWinner + (i === 0 ? remainder : 0);
          }
          const playerLine = ['PLAYER', p.name, p.seat, 0, unformatNumber(p.initialChips) || 0, finalChips, p.hand.length > 0 ? p.hand.map(formatCardForGfx).join(' ') : ''];
          addRow(playerLine);
        });

        const addActionEvent = (actionLog) => {
          const player = playersWithSeats.find(p => p.name === actionLog.player);
          if (!player && actionLog.action !== 'Pot Correction') return;
          const delay = 5000 + Math.random() * 10000;
          currentTime.setTime(currentTime.getTime() + delay);
          const timecode = getFormattedTimeInTimezone(currentTime, state.selectedTimezone);
          let actionType = actionLog.action.toUpperCase().replace('S','');
          if (actionType === 'RAISE') actionType = 'RAISE TO';
          const eventLine = ['EVENT', actionType, player ? player.seat : ''];
          eventLine.push(actionLog.amount ? unformatNumber(actionLog.amount) : '');
          eventLine.push(timecode);
          addRow(eventLine);
        };

        const addBoardEvents = (cards) => {
          const delay = 2000 + Math.random() * 3000;
          currentTime.setTime(currentTime.getTime() + delay);
          const timecode = getFormattedTimeInTimezone(currentTime, state.selectedTimezone);
          cards.forEach(card => addRow(['EVENT','BOARD',1, formatCardForGfx(card), timecode]));
        };

        state.actionState.preflop.forEach(addActionEvent);
        if (state.board.length >= 3) { addBoardEvents(state.board.slice(0,3)); state.actionState.flop.forEach(addActionEvent); }
        if (state.board.length >= 4) { addBoardEvents([state.board[3]]); state.actionState.turn.forEach(addActionEvent); }
        if (state.board.length >= 5) { addBoardEvents([state.board[4]]); state.actionState.river.forEach(addActionEvent); }

        finalRows.push([rowCounter]);
        return finalRows;
      }

      async function sendDataToGoogleSheet() {
        const winners = state.playersInHand.filter(p => p.role === 'winner');
        if (winners.length === 0) { showFeedback('승자를 선택해야 합니다.', true); return; }

        el.sendToSheetBtn.textContent = '전송 중...';
        el.sendToSheetBtn.disabled = true;
        showFeedback('시트로 데이터 전송을 시작합니다...');

        const gfxLogRows = generateGfxLogRows();
        const payload = { rows: gfxLogRows };

        try {
          const response = await fetch(state.appsScriptUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`서버 응답 에러: ${response.status}`);
          const result = await response.json();
          if (result.status === 'success') {
            showFeedback('✅ 데이터가 시트에 성공적으로 입력되었습니다!');
            el.sendToSheetBtn.textContent = '전송 완료!';
            setTimeout(() => { el.sendToSheetBtn.textContent = '시트에 자동 입력'; el.sendToSheetBtn.disabled = false; }, 2000);
          } else {
            throw new Error(result.message || '시트 입력 중 오류 발생');
          }
        } catch (error) {
          console.error('Data submission failed:', error);
          showFeedback(`❌ 전송 실패: ${error.message}`, true);
          el.sendToSheetBtn.textContent = '시트에 자동 입력';
          el.sendToSheetBtn.disabled = false;
        }
      }

      function resetApp() {
        const lastHand = state.allHandNumbers.length ? Math.max(...state.allHandNumbers) : 0;
        const nextHandNum = lastHand + 1;
        const oldBlinds = {
          smallBlind: state.actionState.smallBlind,
          bigBlind: state.actionState.bigBlind,
          hasBBAnte: state.actionState.hasBBAnte
        };
        state.playersInHand = [];
        state.board = [];
        state.actionState = { handNumber: String(nextHandNum), ...oldBlinds, preflop: [], flop: [], turn: [], river: [] };
        renderAll();
        saveActionState();
        el.handNumberDisplay.textContent = `새 핸드 (#${state.actionState.handNumber})`;
      }

      function showFeedback(message, isError = false) {
        el.feedbackMessage.textContent = message;
        el.feedbackMessage.className = `text-center mt-2 h-5 font-semibold ${isError ? 'text-red-400' : 'text-green-400'}`;
        setTimeout(() => el.feedbackMessage.textContent = '', 3000);
      }

      const formatNumber = (val) => val ? new Intl.NumberFormat('en-US').format(unformatNumber(val)) : '';
      const unformatNumber = (val) => val.toString().replace(/,/g, '');
      const toCamelCase = (str) => str.replace(/-([a-z])/g, g => g[1].toUpperCase());

      function setupEventListeners() {
        el.refreshDataBtn.onclick = initializeApp;
        el.resetBtn.onclick = resetApp;
        el.sendToSheetBtn.onclick = sendDataToGoogleSheet;
        el.loadHandBtn.onclick = openLoadHandModal;

        el.tableSelector.onchange = (e) => {
          state.selectedTable = e.target.value;
          state.playersInHand = [];
          renderPlayerSelection(); renderPlayerDetails(); renderWinnerSelection(); renderActionLogs();
        };

        el.timezoneSelector.onchange = (e) => {
          state.selectedTimezone = e.target.value;
          updateTimeDisplay(); renderActionLogs();
        };

        el.playerSelectionButtons.addEventListener('click', e => {
          const btn = e.target.closest('button[data-player-name]');
          if (btn) togglePlayerInHand(btn.dataset.playerName);
        });

        el.playerDetailsSection.addEventListener('click', e => {
          const placeholder = e.target.closest('.card-placeholder');
          if (placeholder) {
            state.modalState.cardTarget = { target: 'playerHand', player: placeholder.dataset.playerName, count: parseInt(placeholder.dataset.count) };
            openCardSelector();
          }
        });

        el.winnerButtons.addEventListener('click', e => {
          const winnerBtn = e.target.closest('.set-winner-btn');
          if (winnerBtn) setPlayerRole(winnerBtn.dataset.playerName);
        });

        // 칩 입력: 위임 방식(재렌더 후에도 동작)
        el.playerDetailsSection.addEventListener('input', e => {
          if (e.target.classList.contains('player-chip-input')) {
            const cardEl = e.target.closest('.player-card');
            const player = state.playersInHand.find(p => p.name === cardEl.dataset.playerName);
            if (player) player.chips = unformatNumber(e.target.value);
            e.target.value = formatNumber(e.target.value);
          }
        });

        // 드래그-드랍
        let draggedPlayerName = null;
        el.playerDetailsSection.addEventListener('dragstart', e => {
          const target = e.target.closest('.player-card');
          if (target) {
            draggedPlayerName = target.dataset.playerName;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedPlayerName);
            setTimeout(() => { target.style.opacity = '0.5'; }, 0);
          }
        });
        el.playerDetailsSection.addEventListener('dragend', e => {
          const target = e.target.closest('.player-card');
          if (target) target.style.opacity = '1';
          draggedPlayerName = null;
        });
        el.playerDetailsSection.addEventListener('dragover', e => { e.preventDefault(); return false; });
        el.playerDetailsSection.addEventListener('drop', e => {
          e.preventDefault();
          const targetCard = e.target.closest('.player-card');
          const targetPlayerName = targetCard ? targetCard.dataset.player
        el.playerDetailsSection.addEventListener('drop', e => {
          e.preventDefault();
          const targetCard = e.target.closest('.player-card');
          const targetPlayerName = targetCard ? targetCard.dataset.playerName : null;
          if (draggedPlayerName && targetPlayerName && draggedPlayerName !== targetPlayerName) {
            const draggedIndex = state.playersInHand.findIndex(p => p.name === draggedPlayerName);
            const targetIndex  = state.playersInHand.findIndex(p => p.name === targetPlayerName);
            if (draggedIndex !== -1 && targetIndex !== -1) {
              const [draggedPlayer] = state.playersInHand.splice(draggedIndex, 1);
              state.playersInHand.splice(targetIndex, 0, draggedPlayer);
              renderPlayerDetails();
              renderWinnerSelection();
            }
          }
          const draggedEl = el.playerDetailsSection.querySelector(`[data-player-name="${draggedPlayerName}"]`);
          if (draggedEl) draggedEl.style.opacity = '1';
        });

        // 보드 카드 선택
        el.boardCardPlaceholders.addEventListener('click', e => {
          const placeholder = e.target.closest('.card-placeholder');
          if (placeholder) {
            state.modalState.cardTarget = {
              target: 'board',
              index: parseInt(placeholder.dataset.index),
              count: parseInt(placeholder.dataset.count)
            };
            openCardSelector();
          }
        });

        // 카드 선택 모달 닫기
        el.cardSelectorModal.addEventListener('click', e => {
          if (e.target.id === 'close-card-modal') closeModal(el.cardSelectorModal);
        });

        // 스트리트 버튼들
        el.streetLogsContainer.addEventListener('click', e => {
          const addBtn  = e.target.closest('.add-action-btn');
          const clearBtn= e.target.closest('.clear-street-btn');
          const potBtn  = e.target.closest('.pot-keypad-btn');

          if (addBtn)  openActionPad(addBtn.dataset.street);
          if (clearBtn) clearStreetActions(clearBtn.dataset.street);
          if (potBtn) {
            // 현재 스트리트 기억 + 팟 교정 키패드 열기
            state.modalState.actionPadStreet = potBtn.dataset.street;
            openKeypad(null, 'pot');
          }
        });

        // 액션 패드 동작
        el.actionPadModal.addEventListener('click', e => {
          const target = e.target.closest('button');
          if (!target) return;
          if (target.id === 'close-action-pad') { closeModal(el.actionPadModal); return; }

          const action = target.dataset.action;
          if (!action) return;

          state.modalState.actionPadCurrentAction = action;
          const amount = target.dataset.amount;

          if (['Bets','Raises','All In'].includes(action)) {
            openKeypad(null, 'bet');            // 금액 입력 필요
          } else if (action === 'Calls') {
            addActionToLog(action, amount);     // 콜 금액은 프리필
          } else {
            addActionToLog(action);             // Checks / Folds
          }
        });

        // 각 입력 옆의 키패드 아이콘
        document.body.addEventListener('click', e => {
          if (e.target.classList.contains('keypad-icon-btn')) {
            openKeypad(e.target.previousElementSibling, 'input');
          }
        });

        // 키패드 모달 처리 (숫자 입력/확인/취소)
        el.keypadModal.addEventListener('click', e => {
          const btn = e.target.closest('button'); if (!btn) return;
          const display = el.keypadModal.querySelector('#keypad-display');
          const key = btn.textContent;

          if (btn.id === 'keypad-confirm') {
            const finalAmount = unformatNumber(display.textContent);

            // 용도별 확정 동작
            if (state.modalState.keypadPurpose === 'bet') {
              if (finalAmount) {
                addActionToLog(state.modalState.actionPadCurrentAction, finalAmount);
              } else {
                closeModal(el.keypadModal);
              }
            } else if (state.modalState.keypadPurpose === 'input' && state.modalState.keypadTarget) {
              state.modalState.keypadTarget.value = formatNumber(finalAmount);
              state.modalState.keypadTarget.dispatchEvent(new Event('input', { bubbles: true }));
              closeModal(el.keypadModal);
            } else if (state.modalState.keypadPurpose === 'pot') {
              const street = state.modalState.actionPadStreet || 'river';
              state.actionState[street].push({
                player: '',
                action: 'Pot Correction',
                amount: finalAmount,
                timestamp: new Date().toISOString()
              });
              saveActionState();
              renderAll();
              closeModal(el.keypadModal);
            }
            return;
          }

          if (btn.id === 'keypad-cancel') { closeModal(el.keypadModal); return; }

          if (key === 'C') {
            display.textContent = '';
          } else if (key === '←') {
            const trimmed = unformatNumber(display.textContent).slice(0, -1);
            display.textContent = formatNumber(trimmed);
          } else {
            display.textContent = formatNumber(unformatNumber(display.textContent) + key);
          }
        });

        // 공통 숫자 인풋 (SB/BB 등) 포맷 + 상태 반영
        document.querySelectorAll('.number-input').forEach(input => {
          input.addEventListener('input', e => {
            const raw = unformatNumber(e.target.value);
            const formatted = formatNumber(raw);
            if (e.target.value !== formatted) e.target.value = formatted;

            let stateKey = e.target.id.replace('-input', '');
            stateKey = toCamelCase(stateKey);
            if (Object.prototype.hasOwnProperty.call(state.actionState, stateKey)) {
              state.actionState[stateKey] = raw;
            }
            saveActionState();
            renderActionStreets(); // 팟 표시 즉시 반영
          });
        });

        // BB Ante 체크
        el.bbAnteCheckbox.onchange = (e) => {
          state.actionState.hasBBAnte = e.target.checked;
          saveActionState();
          renderAll();
        };
      } // setupEventListeners

      async function initializeApp() {
        el.logDisplay.innerHTML = '';
        logMessage('앱 초기화 시작...');
        populateTimezones();
        loadActionState();

        await loadDataFromGoogleSheet();
        renderTableSelection();

        // 핸드 번호 초기 세팅(중복 +1 방지)
        const lastHand = state.allHandNumbers.length ? Math.max(...state.allHandNumbers) : 0;
        if (!state.actionState.handNumber) state.actionState.handNumber = String(lastHand + 1);

        renderAll();
        setupEventListeners();

        el.handNumberDisplay.textContent = `새 핸드 (#${state.actionState.handNumber})`;
        el.smallBlindInput.value = formatNumber(state.actionState.smallBlind);
        el.bigBlindInput.value   = formatNumber(state.actionState.bigBlind);
        el.bbAnteCheckbox.checked = state.actionState.hasBBAnte;

        if (timeUpdater) clearInterval(timeUpdater);
        timeUpdater = setInterval(updateTimeDisplay, 1000);
        updateTimeDisplay();

        logMessage('준비 완료!');
      }

      // 최초 실행
      initializeApp();
    });
</script>
