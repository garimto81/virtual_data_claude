<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>포커 핸드 로거</title>
    <script src="https://cdn-tailwindcss.vercel.app/"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
        html, body { height: 100vh; /* Viewport height */ overflow: hidden; font-family: 'Noto Sans KR', sans-serif; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        #app-container { display: flex; flex-direction: column; height: 100%; }
        main { flex-grow: 1; overflow-y: auto; /* Main content scrolls, not body */ }
        .btn { transition: all 0.1s ease-in-out; }
        .btn:active { transform: scale(0.95); }
        .btn-selected { background-color: #FBBF24 !important; color: #111827 !important; font-weight: bold; }
        .card-placeholder { border: 2px dashed #4B5563; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 1px; background-color: rgba(255,255,255,0.05); flex-shrink: 0; }
        .card-display { font-family: 'Roboto', sans-serif; background-color: white; border-radius: 4px; padding: 1px; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 0.8rem; }
        .card-display .rank { font-weight: bold; font-size: 1rem; }
        .modal { transition: opacity 0.3s ease; backdrop-filter: blur(4px); }
        .card-selector-btn { font-family: 'Roboto', sans-serif; font-size: 1rem; font-weight: bold; }
        .card-selector-btn.card-red { color: #DC2626; }
        .card-selector-btn.card-black { color: #111827; }
        .card-selector-btn.selected { border: 3px solid #FBBF24; transform: scale(0.95); }
        .player-card.is-winner { background-color: rgba(251, 191, 36, 0.1); }
        select, input[type="text"] { font-size: 0.875rem; }
    </style>
</head>
<body class="bg-gray-900 text-white antialiased">

    <div id="app-container">
        <main class="p-2 space-y-2">
            <!-- Hand Info Section -->
            <div class="bg-gray-800 p-2 rounded-lg space-y-2">
                <div class="flex items-center gap-2 text-sm">
                    <div class="flex-1 flex items-center gap-1 bg-gray-700 p-1 rounded-md min-w-0">
                        <span id="hand-number-display" class="font-bold px-1 whitespace-nowrap">#--</span>
                        <button id="load-hand-btn" class="btn bg-gray-600 px-2 py-1 rounded-md text-xs">Load</button>
                    </div>
                    <div class="flex-1 min-w-0">
                        <select id="table-selector" class="w-full bg-gray-700 border border-gray-600 rounded-md px-2 py-1"></select>
                    </div>
                    <div class="flex-1 flex items-center gap-1 min-w-0">
                        <select id="timezone-selector" class="flex-grow bg-gray-700 border border-gray-600 rounded-md px-2 py-1 text-xs"></select>
                        <span id="time-display" class="bg-gray-900/50 p-1 rounded-md font-mono text-xs"></span>
                    </div>
                    <div class="flex items-center gap-1">
                        <button id="manage-players-btn" class="btn bg-gray-600 p-1 rounded-md text-xs">관리</button>
                        <button id="refresh-data" class="text-lg" title="데이터 새로고침">🔄</button>
                    </div>
                </div>
                <div id="player-selection-buttons" class="flex flex-wrap gap-1"></div>
            </div>
            
            <!-- Player Details Section -->
            <div id="player-details-section" class="bg-gray-800 p-2 rounded-lg space-y-1"></div>

            <!-- Action & Board Section -->
            <div class="bg-gray-800 p-2 rounded-lg space-y-2">
                <div class="flex flex-wrap items-center gap-2">
                    <div class="flex items-center gap-1">
                        <div class="input-with-keypad flex items-center"><input type="text" id="small-blind-input" class="number-input w-12 bg-gray-700 p-1 rounded-md text-sm" placeholder="SB"><button class="keypad-icon-btn btn bg-gray-600 p-1 rounded-md text-xs h-auto w-auto px-2 py-1">⌨️</button></div>
                        <div class="input-with-keypad flex items-center"><input type="text" id="big-blind-input" class="number-input w-12 bg-gray-700 p-1 rounded-md text-sm" placeholder="BB"><button class="keypad-icon-btn btn bg-gray-600 p-1 rounded-md text-xs h-auto w-auto px-2 py-1">⌨️</button></div>
                        <div class="flex items-center"><input id="bb-ante-checkbox" type="checkbox" class="h-4 w-4 bg-gray-700 border-gray-600 rounded text-amber-500"><label for="bb-ante-checkbox" class="ml-1 text-xs">Ante</label></div>
                    </div>
                    <div id="board-card-placeholders" class="flex flex-wrap gap-1 items-center flex-grow justify-end"></div>
                </div>
                <div class="space-y-1" id="street-logs-container"></div>
            </div>

            <!-- Winner & Finalize Section -->
            <div class="bg-gray-800 p-2 rounded-lg space-y-2">
                <div class="flex flex-wrap gap-1 items-center">
                    <span class="text-sm font-bold mr-2">승자:</span>
                    <div id="winner-buttons" class="flex flex-wrap gap-1 flex-grow"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                       <button id="reset-btn" class="w-full btn bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-3 rounded-md text-sm">새 핸드</button>
                       <button id="send-to-sheet-btn" class="w-full btn bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-3 rounded-md text-sm">시트 전송</button>
                </div>
                <p id="feedback-message" class="text-center h-4 text-xs font-semibold"></p>
            </div>
        </main>
        <footer class="flex-shrink-0 p-1 text-center">
            <button id="show-log-btn" class="text-gray-500 hover:text-gray-300 text-xs">로그 보기</button>
        </footer>
    </div>

    <!-- Modals -->
    <div id="card-selector-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-2 z-50 hidden opacity-0"></div>
    <div id="action-pad-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 hidden opacity-0"></div>
    <div id="keypad-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 hidden opacity-0"></div>
    <div id="load-hand-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 hidden opacity-0"></div>
    <div id="registration-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 hidden opacity-0"></div>
    <div id="log-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 hidden opacity-0">
        <div class="bg-gray-800 rounded-lg p-4 w-full max-w-lg h-2/3 flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold text-amber-400">로딩 로그</h2>
                <button id="close-log-modal" class="text-2xl">&times;</button>
            </div>
            <div id="log-display" class="bg-gray-900/50 p-3 rounded-md flex-grow overflow-y-auto text-sm font-mono"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let timeUpdater;
            const state = {
                playerDataByTable: {},
                allTables: [],
                allHandNumbers: [],
                allHandData: {},
                selectedTable: null,
                playersInHand: [],
                board: [],
                actionState: {
                    handNumber: '', 
                    smallBlind: '', bigBlind: '', hasBBAnte: false,
                    preflop: [], flop: [], turn: [], river: [],
                },
                appsScriptUrl: 'https://script.google.com/macros/s/AKfycbyDmO5nnjx30Cy5bfJJFK94yI3OxALpkUIH4UGtX9cOV0VmIALb0WrpeFrDLfYLPlgF/exec',
                modalState: {
                    cardTarget: null,
                    actionPadStreet: null, actionPadPlayer: null, actionPadCurrentAction: null,
                    keypadTarget: null,
                    keypadOptions: {},
                },
                selectedTimezone: 'Asia/Seoul'
            };

            const SUITS = { s: '♠', h: '♥', d: '♦', c: '♣' };
            const RANKS = ['A', 'K', 'Q', 'J', '10', '9', '8', '7', '6', '5', '4', '3', '2'];

            const el = {
                refreshDataBtn: document.getElementById('refresh-data'),
                tableSelector: document.getElementById('table-selector'),
                playerSelectionButtons: document.getElementById('player-selection-buttons'),
                boardCardPlaceholders: document.getElementById('board-card-placeholders'),
                playerDetailsSection: document.getElementById('player-details-section'),
                handNumberDisplay: document.getElementById('hand-number-display'),
                loadHandBtn: document.getElementById('load-hand-btn'),
                smallBlindInput: document.getElementById('small-blind-input'),
                bigBlindInput: document.getElementById('big-blind-input'),
                bbAnteCheckbox: document.getElementById('bb-ante-checkbox'),
                streetLogsContainer: document.getElementById('street-logs-container'),
                winnerButtons: document.getElementById('winner-buttons'),
                sendToSheetBtn: document.getElementById('send-to-sheet-btn'),
                resetBtn: document.getElementById('reset-btn'),
                feedbackMessage: document.getElementById('feedback-message'),
                logDisplay: document.getElementById('log-display'),
                logModal: document.getElementById('log-modal'),
                showLogBtn: document.getElementById('show-log-btn'),
                closeLogModalBtn: document.getElementById('close-log-modal'),
                cardSelectorModal: document.getElementById('card-selector-modal'),
                actionPadModal: document.getElementById('action-pad-modal'),
                keypadModal: document.getElementById('keypad-modal'),
                loadHandModal: document.getElementById('load-hand-modal'),
                timezoneSelector: document.getElementById('timezone-selector'),
                timeDisplay: document.getElementById('time-display'),
                managePlayersBtn: document.getElementById('manage-players-btn'),
                registrationModal: document.getElementById('registration-modal'),
            };

            function openLogModal() {
                el.logModal.classList.remove('hidden');
                setTimeout(() => el.logModal.classList.remove('opacity-0'), 10);
            }
            function closeLogModal() {
                el.logModal.classList.add('opacity-0');
                setTimeout(() => el.logModal.classList.add('hidden'), 300);
            }

            function logMessage(message, isError = false) {
                const logEntry = document.createElement('div');
                logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                logEntry.className = isError ? 'text-red-400' : 'text-green-400';
                el.logDisplay.appendChild(logEntry);
                el.logDisplay.scrollTop = el.logDisplay.scrollHeight;
            }

            function getFormattedTimeInTimezone(date, timezone) {
                try {
                    const options = { timeZone: timezone, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
                    return new Intl.DateTimeFormat('ko-KR', options).format(date);
                } catch (e) {
                    const pad = (num) => num.toString().padStart(2, '0');
                    return `${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
                }
            }
            
            function populateTimezones() {
                const timezones = { "Asia/Seoul": "한국", "Asia/Nicosia": "키프로스" };
                const selector = el.timezoneSelector;
                selector.innerHTML = '';
                for (const [value, text] of Object.entries(timezones)) {
                    const option = document.createElement('option');
                    option.value = value;
                    option.textContent = text;
                    selector.appendChild(option);
                }
                selector.value = state.selectedTimezone;
            }

            function updateTimeDisplay() { el.timeDisplay.textContent = getFormattedTimeInTimezone(new Date(), state.selectedTimezone); }

            function parseGfxLogData(logRows) {
                const allHandData = {};
                let currentHand = null;
                let currentStreet = 'preflop';

                logRows.forEach(row => {
                    if (row.length < 2) return; // 빈 행이나 잘못된 행은 건너뜁니다.
                    const type = row[1];

                    if (type === 'HAND') {
                        if (currentHand) {
                            allHandData[currentHand.handNumber] = currentHand;
                        }
                        
                        currentHand = {
                            handNumber: row[2],
                            table: '',
                            smallBlind: row[8],
                            bigBlind: row[9],
                            hasBBAnte: row[6] === 'BB_ANTE',
                            players: [],
                            board: [],
                            actions: { preflop: [], flop: [], turn: [], river: [] },
                            totalPot: 0
                        };
                        currentStreet = 'preflop';
                    }

                    if (!currentHand) return;

                    if (type === 'PLAYER') {
                        const playerName = row[2];
                        const initialChips = parseInt(row[5] || 0);
                        const finalChips = parseInt(row[6] || 0);
                        const handCards = row[7] ? row[7].split(' ') : [];
                        
                        currentHand.players.push({
                            name: playerName,
                            initialChips: initialChips,
                            finalChips: finalChips,
                            hand: handCards,
                            role: finalChips > initialChips ? 'winner' : null
                        });
                    }

                    if (type === 'EVENT') {
                        const eventType = row[2];
                        
                        if (eventType === 'BOARD') {
                            currentHand.board.push(row[4]);
                            if (currentHand.board.length === 3) currentStreet = 'flop';
                            else if (currentHand.board.length === 4) currentStreet = 'turn';
                            else if (currentHand.board.length === 5) currentStreet = 'river';
                        } else {
                            const playerSeat = row[3];
                            if (!playerSeat || !currentHand.players[parseInt(playerSeat) - 1]) return;
                            const player = currentHand.players[parseInt(playerSeat) - 1];
                            
                            const amount = row[4] || null;
                            const actionLog = {
                                player: player.name,
                                action: eventType,
                                amount: amount,
                                timestamp: row[5]
                            };
                            currentHand.actions[currentStreet].push(actionLog);
                            if (amount) {
                               currentHand.totalPot += parseInt(String(amount).replace(/,/g, '') || 0);
                            }
                        }
                    }
                });

                if (currentHand) {
                    allHandData[currentHand.handNumber] = currentHand;
                }
                
                 for(const handNum in allHandData) {
                    const hand = allHandData[handNum];
                    hand.totalPot += parseInt(String(hand.smallBlind).replace(/,/g, '') || 0);
                    hand.totalPot += parseInt(String(hand.bigBlind).replace(/,/g, '') || 0);
                    if(hand.hasBBAnte) hand.totalPot += parseInt(String(hand.bigBlind).replace(/,/g, '') || 0);

                    const firstPlayerName = hand.players.length > 0 ? hand.players[0].name : null;
                    if(firstPlayerName) {
                        for(const tableName in state.playerDataByTable) {
                            if(state.playerDataByTable[tableName].some(p => p.name === firstPlayerName)){
                                hand.table = tableName;
                                break;
                            }
                        }
                    }
                }
                return allHandData;
            }

            async function loadDataFromGoogleSheet() {
                logMessage('초기 데이터 로딩 시작...');
                try {
                    // 1단계: 선수 목록 및 테이블 정보는 기존 앱 스크립트에서 가져옵니다.
                    logMessage('선수 목록 데이터 가져오는 중...');
                    const appScriptResponse = await fetch(`${state.appsScriptUrl}?action=getInitialData`);
                    if (!appScriptResponse.ok) throw new Error(`앱 스크립트 응답 오류: ${appScriptResponse.status}`);
                    const initialData = await appScriptResponse.json();
                    if(initialData.error) throw new Error(initialData.error);
                    
                    state.playerDataByTable = initialData.playerData || {};
                    state.allTables = Object.keys(state.playerDataByTable).sort();
                    logMessage('선수 목록 로딩 완료.');

                    // 2단계: GFX 핸드 로그는 공개된 CSV 주소에서 직접 가져옵니다.
                    logMessage('GFX 핸드 로그 원본 데이터 가져오는 중...');
                    const gfxLogUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSDY_i4330JANAjIz4sMncdJdRHsOkfUCjQusHTGQk2tykrhA4d09LeIp3XRbLd8hkN6SgSB47k_nux/pub?gid=1906746276&single=true&output=csv';
                    const gfxResponse = await fetch(gfxLogUrl);
                    if (!gfxResponse.ok) throw new Error(`GFX 로그 시트 응답 오류: ${gfxResponse.status}`);
                    const csvText = await gfxResponse.text();
                    
                    // 3단계: 가져온 CSV 텍스트를 줄과 쉼표 기준으로 잘라 배열로 만듭니다.
                    const logRows = csvText.split(/\r?\n/).map(row => row.split(','));
                    logRows.shift(); // 헤더(첫 줄)는 제거합니다.

                    // 4단계: 새로 만든 클라이언트 파서로 원본 로그를 분석합니다.
                    logMessage('핸드 로그 데이터 파싱 중...');
                    state.allHandData = parseGfxLogData(logRows);
                    state.allHandNumbers = Object.keys(state.allHandData).map(n => parseInt(n, 10)).sort((a, b) => a - b);
                    logMessage('핸드 로그 파싱 완료.');

                } catch (error) { 
                    console.error('Failed to load initial data:', error); 
                    logMessage(`초기 데이터 로딩 실패: ${error.message}`, true);
                }
            }
            
            function renderTableSelection() {
                const selector = el.tableSelector;
                selector.innerHTML = '<option value="">테이블 선택</option>';
                state.allTables.forEach(tableName => {
                    const option = document.createElement('option');
                    option.value = tableName;
                    option.textContent = tableName;
                    selector.appendChild(option);
                });
            }

            function renderPlayerSelection() {
                if (!state.selectedTable) {
                    el.playerSelectionButtons.innerHTML = '<p class="text-gray-500 text-xs">테이블을 먼저 선택해주세요.</p>';
                    return;
                }
                const playersForTable = state.playerDataByTable[state.selectedTable] || [];
                el.playerSelectionButtons.innerHTML = playersForTable.map(playerData => {
                    const isSelected = state.playersInHand.some(p => p.name === playerData.name);
                    return `<button class="btn ${isSelected ? 'btn-selected' : 'bg-gray-600 hover:bg-gray-500'} px-2 py-1 text-xs rounded-md" data-player-name="${playerData.name}">${playerData.name}</button>`;
                }).join('');
            }

            function renderPlayerDetails() {
                el.playerDetailsSection.innerHTML = state.playersInHand.map(p => {
                    const roleClass = (p.role === 'winner') ? 'is-winner' : '';
                    return `<div class="player-card flex items-center gap-2 text-sm border-b border-gray-700 pb-1 ${roleClass}" data-player-name="${p.name}">
                            <div class="w-1/4 truncate font-bold">${p.name}</div>
                            <div class="w-1/4">
                                <input type="text" readonly class="number-input player-chip-input w-full bg-gray-700 border border-gray-600 rounded-md p-1 text-xs" placeholder="칩" value="${formatNumber(p.chips)}">
                            </div>
                            <div class="w-1/4">
                                <button class="keypad-icon-btn btn bg-gray-600 p-1 rounded-md text-xs w-full">⌨️</button>
                            </div>
                            <div class="w-1/4 card-placeholder h-10 flex justify-center items-center gap-1" data-player-name="${p.name}" data-count="2">
                                ${p.hand.length > 0 ? p.hand.map(formatCardDisplay).join('') : '<span class="text-gray-400 text-lg">+</span>'}
                            </div>
                        </div>`;
                }).join('');
            }

            function renderBoard() {
                const flopHTML = `<div class="card-placeholder h-10 w-24" data-target="board" data-index="0" data-count="3">${[0, 1, 2].map(i => state.board[i] ? formatCardDisplay(state.board[i]) : '').join('') || '<span class="text-gray-400 text-lg">+</span>'}</div>`;
                const turnHTML = `<div class="card-placeholder h-10 w-8" data-target="board" data-index="3" data-count="1">${state.board[3] ? formatCardDisplay(state.board[3]) : '<span class="text-gray-400 text-lg">+</span>'}</div>`;
                const riverHTML = `<div class="card-placeholder h-10 w-8" data-target="board" data-index="4" data-count="1">${state.board[4] ? formatCardDisplay(state.board[4]) : '<span class="text-gray-400 text-lg">+</span>'}</div>`;
                el.boardCardPlaceholders.innerHTML = flopHTML + turnHTML + riverHTML;
            }

            function renderActionStreets() {
                const streets = ['preflop', 'flop', 'turn', 'river'];
                let cumulativePot = 0;

                el.streetLogsContainer.innerHTML = streets.map(street => {
                    const streetActions = state.actionState[street];
                    let streetPot = 0;
                    if (street === 'preflop') {
                        streetPot += parseInt(unformatNumber(state.actionState.smallBlind) || 0, 10) + parseInt(unformatNumber(state.actionState.bigBlind) || 0, 10);
                        if (state.actionState.hasBBAnte) streetPot += parseInt(unformatNumber(state.actionState.bigBlind) || 0, 10);
                    }
                    streetActions.forEach(action => { if (action.amount) streetPot += parseInt(unformatNumber(action.amount), 10); });
                    cumulativePot += streetPot;

                    const logHTML = state.actionState[street].map(log => {
                        const player = state.playersInHand.find(p => p.name === log.player);
                        const playerClass = (player?.role === 'winner') ? 'text-amber-400' : 'text-gray-300';
                        const amountText = log.amount ? ` <span class="font-mono text-white">${formatNumber(log.amount)}</span>` : '';
                        return `<span class="action-log-entry mr-2"><span class="${playerClass}">${log.player}</span> ${log.action}${amountText}</span>`;
                    }).join('');

                    return `<div class="street-container bg-gray-900/50 p-1 rounded-md">
                            <div class="flex justify-between items-center text-xs mb-1">
                                <strong class="text-amber-400 w-14">${street}</strong>
                                <div class="flex items-center gap-1">
                                    <span class="font-mono">Pot: ${formatNumber(cumulativePot)}</span>
                                    <button class="pot-keypad-btn btn bg-gray-600 px-1 py-0 rounded" data-street="${street}" data-current-pot="${cumulativePot}">⌨️</button>
                                </div>
                                <div class="flex gap-1">
                                    <button class="add-action-btn btn bg-indigo-600 text-white font-bold py-1 px-2 rounded" data-street="${street}">액션+</button>
                                    <button class="undo-action-btn btn bg-gray-600 py-1 px-2 rounded" data-street="${street}">↩</button>
                                </div>
                            </div>
                            <div id="${street}-log" class="action-log-display text-xs whitespace-nowrap overflow-x-auto">${logHTML || '<span class="text-gray-500">No actions</span>'}</div>
                        </div>`;
                }).join('');
            }
            
            function renderWinnerSelection() {
                el.winnerButtons.innerHTML = state.playersInHand.map(p => {
                    const isSelected = p.role === 'winner';
                    return `<button class="btn ${isSelected ? 'btn-selected' : 'bg-gray-600 hover:bg-gray-500'} px-2 py-1 text-xs rounded-md set-winner-btn" data-player-name="${p.name}">${p.name}</button>`;
                }).join('');
            }

            function formatCardDisplay(cardId) {
                const rank = cardId.slice(0, -1);
                const suitKey = cardId.slice(-1);
                const colorClass = (suitKey === 'h' || suitKey === 'd') ? 'text-red-500' : 'text-black';
                return `<div class="card-display h-full w-full ${colorClass}"><div class="rank">${rank}</div><div>${SUITS[suitKey]}</div></div>`;
            }

            function renderAll() {
                renderPlayerSelection();
                renderPlayerDetails();
                renderBoard();
                renderActionStreets();
                renderWinnerSelection();
            }

            function openModal(modalElement, content) {
                modalElement.innerHTML = content;
                modalElement.classList.remove('hidden');
                setTimeout(() => modalElement.classList.remove('opacity-0'), 10);
            }

            function closeModal(modalElement) {

            }

            function openCardSelector() {
                const { count } = state.modalState.cardTarget;
                const allHands = state.playersInHand.flatMap(p => p.hand);
                const usedCards = [...allHands, ...state.board].filter(Boolean);
                let selectedCards = [];
                let deckHTML = '';
                
                Object.keys(SUITS).forEach(suitKey => {
                    deckHTML += `<div class="flex justify-center gap-1 mb-1">`;
                    RANKS.forEach(rank => {
                        const cardId = `${rank}${suitKey}`;
                        const isUsed = usedCards.includes(cardId);
                        const colorClass = (suitKey === 'h' || suitKey === 'd') ? 'card-red' : 'card-black';
                        deckHTML += `<button class="btn card-selector-btn rounded-md w-9 h-11 ${isUsed ? 'bg-gray-600 text-gray-500' : 'bg-white hover:bg-amber-300'} ${colorClass}" data-card-id="${cardId}" ${isUsed ? 'disabled' : ''}>${rank}${SUITS[suitKey]}</button>`;
                    });
                    deckHTML += '</div>';
                });

                const content = `<div class="bg-gray-800 rounded-lg p-2 w-full max-w-md"><h2 class="text-lg font-bold text-amber-400 mb-2 text-center">카드 선택 (${count}장)</h2><div id="card-deck">${deckHTML}</div><button id="close-card-modal" class="btn mt-2 w-full bg-red-600 py-2 rounded-md">닫기</button></div>`;

                    if (selectedIndex > -1) {
                        selectedCards.splice(selectedIndex, 1);
                        btn.classList.remove('selected');
                    } else if (selectedCards.length < count) {
                        selectedCards.push(cardId);
                        btn.classList.add('selected');
                    }
                    if (selectedCards.length === count) {
                        assignCard(selectedCards);
                    }
                };
            }

             function togglePlayerInHand(playerName) {
                const playerIndex = state.playersInHand.findIndex(p => p.name === playerName);
                if (playerIndex > -1) {
                    state.playersInHand.splice(playerIndex, 1);
                } else {
                    const playersForTable = state.playerDataByTable[state.selectedTable] || [];
                    const playerData = playersForTable.find(p => p.name === playerName);
                    const initialChips = playerData ? playerData.chips : '';
                    state.playersInHand.push({ name: playerName, hand: [], chips: initialChips, initialChips: initialChips, role: null });
                }
                renderPlayerSelection();
                renderPlayerDetails();
                renderWinnerSelection();
            }

            function setPlayerRole(playerName) {
                const targetPlayer = state.playersInHand.find(p => p.name === playerName);
                if (!targetPlayer) return;
                
                if (targetPlayer.role === 'winner') {
                    targetPlayer.role = null;
                } else {
                    targetPlayer.role = 'winner';
                }
                renderPlayerDetails();
                renderWinnerSelection();
            }

            function assignCard(cards) {
                const { target, player, index } = state.modalState.cardTarget;
                if(target === 'board') {
                    cards.forEach((card, i) => state.board[index + i] = card);
                    renderBoard();
                } else {
                    const targetPlayer = state.playersInHand.find(p => p.name === player);
                    if(targetPlayer) {
                        targetPlayer.hand = cards;
                        renderPlayerDetails();
                    }
                }
                closeModal(el.cardSelectorModal);
            }

            function addActionToLog(action, amount = null) {
                const { actionPadStreet, actionPadPlayer } = state.modalState;
                if (amount) {
                    const player = state.playersInHand.find(p => p.name === actionPadPlayer);
                    if (player) {
                        const currentChips = parseInt(unformatNumber(player.chips) || 0, 10);
                        player.chips = (currentChips - parseInt(unformatNumber(amount), 10)).toString();
                    }
                }
                state.actionState[actionPadStreet].push({ player: actionPadPlayer, action, amount, timestamp: new Date().toISOString() });
                saveActionState(); renderAll(); closeModal(el.actionPadModal);
            }

            function undoLastAction(street) {
                const lastAction = state.actionState[street].pop();
                if (lastAction && lastAction.amount) {
                    const player = state.playersInHand.find(p => p.name === lastAction.player);
                    if (player) {
                        const currentChips = parseInt(unformatNumber(player.chips) || 0, 10);
                        player.chips = (currentChips + parseInt(unformatNumber(lastAction.amount), 10)).toString();
                    }
                }
                saveActionState(); renderAll();
            }
            
            function saveActionState() { localStorage.setItem('pokerActionState_v38_unified_keypad', JSON.stringify(state.actionState)); }
            function loadActionState() {
                const savedState = localStorage.getItem('pokerActionState_v38_unified_keypad');
                if (savedState) state.actionState = { ...state.actionState, ...JSON.parse(savedState) };
            }

            function calculatePotSize() {
                let pot = 0;
                pot += parseInt(unformatNumber(state.actionState.smallBlind) || 0, 10) + parseInt(unformatNumber(state.actionState.bigBlind) || 0, 10);
                if (state.actionState.hasBBAnte) pot += parseInt(unformatNumber(state.actionState.bigBlind) || 0, 10);
                ['preflop', 'flop', 'turn', 'river'].forEach(street => {
                    state.actionState[street].forEach(action => { if (action.amount) pot += parseInt(unformatNumber(action.amount), 10); });
                });
                return pot;
            }
            
            function generateGfxLogRows() {
                const finalRows = []; let rowCounter = 1;
                const addRow = (data) => {
                    const paddedData = [...data]; while (paddedData.length < 16) { paddedData.push(''); }
                    finalRows.push([rowCounter, ...paddedData]); rowCounter++;
                };
                const handStartTime = new Date(); let currentTime = new Date(handStartTime.getTime());
                const playersWithSeats = state.playersInHand.map((p, i) => ({ ...p, seat: i + 1 }));
                const totalPot = calculatePotSize();
                const winners = playersWithSeats.filter(p => p.role === 'winner');
                const potPerWinner = winners.length > 0 ? Math.floor(totalPot / winners.length) : 0;
                addRow(['GAME', 'PokerGFX 3.111', 'FEATURE_TABLE']); addRow(['PAYOUTS']);
                const handLine = ['HAND', unformatNumber(state.actionState.handNumber) || '1', Math.floor(handStartTime.getTime() / 1000), 'HOLDEM', state.actionState.hasBBAnte ? 'BB_ANTE' : 'NO_ANTE', unformatNumber(state.actionState.bigBlind) || 0, 0, unformatNumber(state.actionState.smallBlind) || 0, unformatNumber(state.actionState.bigBlind) || 0, 0, 1, 2, 3, 0, 0, 1 ];
                addRow(handLine);
                playersWithSeats.forEach(p => {
                    let finalChips = parseInt(unformatNumber(p.chips) || 0, 10);
                    if (p.role === 'winner') { finalChips += potPerWinner; }
                    addRow(['PLAYER', p.name, p.seat, 0, unformatNumber(p.initialChips) || 0, finalChips, p.hand.length > 0 ? p.hand.join(' ') : '']);
                });
                const addActionEvent = (actionLog) => {
                    const player = playersWithSeats.find(p => p.name === actionLog.player);
                    if (!player && actionLog.action !== 'Pot Correction') return;
                    currentTime.setTime(currentTime.getTime() + (2000 + Math.random() * 3000));
                    const timecode = getFormattedTimeInTimezone(currentTime, state.selectedTimezone);
                    let actionType = actionLog.action.toUpperCase().replace(/S$/, '');
                    if (actionType === 'BET/RAISES') actionType = 'RAISE TO';
                    addRow(['EVENT', actionType, player ? player.seat : '', actionLog.amount ? unformatNumber(actionLog.amount) : '', timecode]);
                };
                const addBoardEvents = (cards) => {
                    currentTime.setTime(currentTime.getTime() + (1000 + Math.random() * 2000));
                    const timecode = getFormattedTimeInTimezone(currentTime, state.selectedTimezone);
                    cards.forEach(card => addRow(['EVENT', 'BOARD', 1, card, timecode]));
                };
                state.actionState.preflop.forEach(addActionEvent);
                if (state.board.length >= 3) { addBoardEvents(state.board.slice(0, 3)); state.actionState.flop.forEach(addActionEvent); }
                if (state.board.length >= 4) { addBoardEvents([state.board[3]]); state.actionState.turn.forEach(addActionEvent); }
                if (state.board.length >= 5) { addBoardEvents([state.board[4]]); state.actionState.river.forEach(addActionEvent); }
                finalRows.push([rowCounter]); 
                return finalRows;
            }

            function loadHandData(handNumber) {
                const handData = state.allHandData[handNumber];
                if (!handData) {
                    showFeedback(`Hand #${handNumber} 데이터를 찾을 수 없습니다.`, true);
                    return;
                }

                state.playersInHand = [];
                state.board = [];
                const actions = handData.actions || {};

                state.actionState = {
                    ...state.actionState,
                    handNumber: handNumber,
                    smallBlind: handData.smallBlind || '',
                    bigBlind: handData.bigBlind || '',
                    hasBBAnte: handData.hasBBAnte || false,
                    preflop: actions.preflop || [],
                    flop: actions.flop || [],
                    turn: actions.turn || [],
                    river: actions.river || [],
                };
                
                state.selectedTable = handData.table || '';
                el.tableSelector.value = state.selectedTable;

                state.playersInHand = (handData.players || []).map(p => ({
                    name: p.name,
                    hand: p.hand || [],
                    chips: p.finalChips,
                    initialChips: p.initialChips,
                    role: p.role || null
                }));
                
                state.board = handData.board || [];

                el.handNumberDisplay.textContent = `#${handNumber}`;
                el.smallBlindInput.value = formatNumber(state.actionState.smallBlind);
                el.bigBlindInput.value = formatNumber(state.actionState.bigBlind);
                el.bbAnteCheckbox.checked = state.actionState.hasBBAnte;

                renderAll();
                saveActionState();
                closeModal(el.loadHandModal);
                showFeedback(`#${handNumber} 핸드를 불러왔습니다.`);
            }

                if (!state.allHandNumbers || state.allHandNumbers.length === 0) {
                    showFeedback('저장된 핸드 데이터가 없습니다.', true);

                        <div class="flex justify-between items-center">
                            <span class="font-bold text-white">#${num}</span>
                            <span class="text-xs text-amber-400 truncate">${winnerInfo ? `🏆 ${winnerInfo}` : ''}</span>
                            <span class="text-xs text-gray-300">${potInfo}</span>
                        </div>
                        <div class="text-xs text-gray-400 mt-1">${hand.table || '테이블 정보 없음'}</div>
                    </button>`
                }).join('');

                const content = `<div class="bg-gray-800 rounded-lg p-4 w-full max-w-md flex flex-col h-2/3">
                    <div class="flex justify-between items-center mb-4">
                         <h2 class="text-xl font-bold text-amber-400">핸드 불러오기</h2>
                         <button id="close-load-hand-modal" class="text-2xl">&times;</button>
                    </div>
                    <div class="overflow-y-auto space-y-2 flex-grow pr-2">${handsHTML}</div>
                </div>`;
                openModal(el.loadHandModal, content);

                el.loadHandModal.onclick = e => {
                    const closeBtn = e.target.closest('#close-load-hand-modal');
                    const handBtn = e.target.closest('.load-hand-item-btn');
                    if (closeBtn) {
                        closeModal(el.loadHandModal);
                    } else if (handBtn) {
                        const handNumber = handBtn.dataset.handNumber;

            async function sendDataToGoogleSheet() {
                if (state.playersInHand.filter(p => p.role === 'winner').length === 0) {
                    showFeedback('승자를 선택해야 합니다.', true);
                    return;
                }
                openLogModal();
                logMessage('시트 전송 시작...');
                el.sendToSheetBtn.textContent = '전송 중...';
                el.sendToSheetBtn.disabled = true;
                let successfulWrite = false;

                try {
                    const gfxLogRows = generateGfxLogRows();
                    logMessage(`${gfxLogRows.length}개 행 데이터 생성 완료.`);
                    logMessage('Google Apps Script로 데이터 전송 시도...');
                    const response = await fetch(state.appsScriptUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ rows: gfxLogRows })
                    });

                    if (!response.ok) {
                        throw new Error(`서버 응답 에러: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        logMessage('✅ 전송 성공! (Apps Script 정상 응답)');
                        successfulWrite = true;
                    } else {
                        logMessage('⚠️ Apps Script가 성공 메시지를 반환하지 않았습니다.');
                        logMessage('데이터는 시트에 기록된 것으로 간주하고 앱을 새로고침합니다.');
                        successfulWrite = true; 
                    }
                } catch (error) {
                    console.error('Data submission failed:', error);
                    logMessage(`전송 중 오류 발생: ${error.message}`, true);
                    
                    if (error instanceof SyntaxError) {
                         logMessage('Apps Script의 응답을 파싱할 수 없습니다. 데이터는 기록된 것으로 간주하고 새로고침합니다.');
                         successfulWrite = true;
                    } else {
                        showFeedback(`❌ 전송 실패: ${error.message}`, true);
                    }
                } finally {
                    if (successfulWrite) {
                        showFeedback('✅ 데이터가 기록되었습니다. 핸드 목록을 업데이트합니다.');
                        el.sendToSheetBtn.textContent = '업데이트 중...';
                        
                        await loadDataFromGoogleSheet();
                        renderTableSelection();
                        resetApp();
                        
                        el.sendToSheetBtn.textContent = '전송 완료!';
                        setTimeout(() => {
                            el.sendToSheetBtn.textContent = '시트 전송';
                            el.sendToSheetBtn.disabled = false;
                            closeLogModal();
                        }, 1500);

                    } else {
                        el.sendToSheetBtn.textContent = '시트 전송';
                        el.sendToSheetBtn.disabled = false;
                    }
                }
            }


            function resetApp() {
                const nextHandNum = state.allHandNumbers.length > 0 ? Math.max(...state.allHandNumbers) + 1 : 1;
                state.playersInHand = []; state.board = [];
                state.actionState = {
                    handNumber: nextHandNum.toString(), smallBlind: state.actionState.smallBlind, bigBlind: state.actionState.bigBlind, hasBBAnte: state.actionState.hasBBAnte,
                    preflop: [], flop: [], turn: [], river: []
                };
                renderAll(); saveActionState();
                el.handNumberDisplay.textContent = `#${state.actionState.handNumber}`;
            }

            function showFeedback(message, isError = false) {
                el.feedbackMessage.textContent = message;
                el.feedbackMessage.className = `text-center h-4 text-xs font-semibold ${isError ? 'text-red-400' : 'text-green-400'}`;
            }
            
            const formatNumber = (val) => val ? new Intl.NumberFormat('en-US').format(unformatNumber(val)) : '';
            const unformatNumber = (val) => String(val || '').replace(/,/g, '');
            const toCamelCase = (str) => str.replace(/-([a-z])/g, g => g[1].toUpperCase());

            function setupEventListeners() {
                el.refreshDataBtn.onclick = initializeApp;
                el.resetBtn.onclick = resetApp;
                el.loadHandBtn.onclick = openLoadHandModal;
                el.sendToSheetBtn.onclick = sendDataToGoogleSheet;
                el.showLogBtn.onclick = openLogModal;
                el.closeLogModalBtn.onclick = closeLogModal;
                
                el.tableSelector.onchange = (e) => { state.selectedTable = e.target.value; state.playersInHand = []; renderAll(); };
                el.timezoneSelector.onchange = (e) => { state.selectedTimezone = e.target.value; updateTimeDisplay(); renderAll(); };
                el.playerSelectionButtons.addEventListener('click', e => e.target.closest('button')?.dataset.playerName && togglePlayerInHand(e.target.closest('button').dataset.playerName));
                
                el.playerDetailsSection.addEventListener('click', e => {
                    const cardPlaceholder = e.target.closest('.card-placeholder');
                    const keypadBtn = e.target.closest('.keypad-icon-btn');
                    const playerCard = e.target.closest('.player-card');
                    if (!playerCard) return;

                    if (cardPlaceholder) {
                        state.modalState.cardTarget = { target: 'playerHand', player: cardPlaceholder.dataset.playerName, count: parseInt(cardPlaceholder.dataset.count) };
                        openCardSelector();
                    } else if (keypadBtn) {
                        const input = playerCard.querySelector('.player-chip-input');
                        openKeypad(input, { purpose: 'input' });
                    }
                });

                el.winnerButtons.addEventListener('click', e => { const winnerBtn = e.target.closest('.set-winner-btn'); if(winnerBtn) setPlayerRole(winnerBtn.dataset.playerName); });
                
                el.playerDetailsSection.addEventListener('input', e => {
                    if (e.target.classList.contains('player-chip-input')) {
                        const player = state.playersInHand.find(p => p.name === e.target.closest('.player-card').dataset.playerName);
                        if(player) player.chips = unformatNumber(e.target.value);
                        e.target.value = formatNumber(e.target.value);
                    }
                });

                el.boardCardPlaceholders.addEventListener('click', e => {
                    const placeholder = e.target.closest('.card-placeholder');
                    if (placeholder) {
                        state.modalState.cardTarget = { target: 'board', index: parseInt(placeholder.dataset.index), count: parseInt(placeholder.dataset.count) };
                        openCardSelector();
                    }
                });
                
                el.cardSelectorModal.addEventListener('click', e => { if (e.target.id === 'close-card-modal') closeModal(el.cardSelectorModal); });
                
                el.streetLogsContainer.addEventListener('click', e => {
                    const addBtn = e.target.closest('.add-action-btn');
                    const undoBtn = e.target.closest('.undo-action-btn');
                    const potBtn = e.target.closest('.pot-keypad-btn');
                    if(addBtn) openActionPad(addBtn.dataset.street);
                    if(undoBtn) undoLastAction(undoBtn.dataset.street);
                    if(potBtn) {
                        state.modalState.actionPadStreet = potBtn.dataset.street;
                        openKeypad(null, { purpose: 'pot', currentPot: potBtn.dataset.currentPot });
                    }
                });
                
                el.actionPadModal.addEventListener('click', e => {
                    const target = e.target.closest('button');
                    if (!target || target.id === 'close-action-pad') { closeModal(el.actionPadModal); return; }
                    const modal = el.actionPadModal;
                    if (target.parentElement.id === 'action-pad-players') {
                        state.modalState.actionPadPlayer = target.dataset.playerName;
                        modal.querySelector('#action-pad-players').classList.add('hidden');
                        modal.querySelector('#action-pad-actions').classList.remove('hidden');
                    } else if (target.parentElement.id === 'action-pad-actions') {
                        const action = target.dataset.action;
                        if (action === 'Bet/Raises') {
                            const hasBet = state.actionState[state.modalState.actionPadStreet].some(a => a.action === 'Bets' || a.action === 'Raises');
                            state.modalState.actionPadCurrentAction = hasBet ? 'Raises' : 'Bets';
                            closeModal(el.actionPadModal); openKeypad(null, { purpose: 'bet' });
                        } else if (action === 'All In') {
                            const player = state.playersInHand.find(p => p.name === state.modalState.actionPadPlayer);
                            if (player) addActionToLog('All In', player.chips);
                        } else if (action === 'Calls') {
                            const lastBet = [...state.actionState[state.modalState.actionPadStreet]].reverse().find(a => a.action.includes('Bet') || a.action.includes('Raise'));
                            const callAmount = lastBet ? lastBet.amount : unformatNumber(state.actionState.bigBlind);
                            addActionToLog('Calls', callAmount);
                        } else { addActionToLog(action); }
                    }
                });
                
                document.body.addEventListener('click', e => {
                    const keypadBtn = e.target.closest('.keypad-icon-btn');
                    if(keypadBtn && !keypadBtn.closest('.player-card')) {
                         openKeypad(keypadBtn.previousElementSibling, { purpose: 'input' });
                    }
                });
                
                el.keypadModal.addEventListener('click', e => {
                    const btn = e.target.closest('button'); if(!btn) return;
                    const display = el.keypadModal.querySelector('#keypad-display');
                    const key = btn.textContent;
                    
                    if (btn.id === 'keypad-confirm') {
                        const finalAmount = unformatNumber(display.textContent);
                        const { purpose, currentPot } = state.modalState.keypadOptions;

                        if (purpose === 'bet') {
                            if(finalAmount) addActionToLog(state.modalState.actionPadCurrentAction, finalAmount);
                        } else if (purpose === 'pot') {
                            const correction = parseInt(finalAmount, 10) - parseInt(currentPot, 10);
                            if (correction !== 0) {
                                state.actionState[state.modalState.actionPadStreet].push({ action: 'Pot Correction', amount: correction.toString(), timestamp: new Date().toISOString() });
                                saveActionState(); renderAll();
                            }
                        } else if (purpose === 'input') {
                            if (state.modalState.keypadTarget) {
                                state.modalState.keypadTarget.value = display.textContent;
                                state.modalState.keypadTarget.dispatchEvent(new Event('input', { bubbles: true }));
                            }
                        }
                        closeModal(el.keypadModal);
                    } else if (btn.id === 'keypad-cancel') { 
                        closeModal(el.keypadModal);
                    } else if (key === 'C') { 
                        display.textContent = '';
                    } else if (key === '←') { 
                        display.textContent = formatNumber(unformatNumber(display.textContent).slice(0, -1));
                    } else { // It's a number key
                        display.textContent = formatNumber(unformatNumber(display.textContent) + key);
                    }
                });
                
                document.querySelectorAll('.number-input').forEach(input => {
                    input.addEventListener('input', e => {
                        const unformatted = unformatNumber(e.target.value);
                        const formatted = formatNumber(unformatted);
                        if (e.target.value !== formatted) e.target.value = formatted;
                        const stateKey = toCamelCase(e.target.id.replace('-input', ''));
                        if(state.actionState.hasOwnProperty(stateKey)) state.actionState[stateKey] = unformatted;
                        saveActionState();
                    });
                });
                
                el.bbAnteCheckbox.onchange = (e) => { state.actionState.hasBBAnte = e.target.checked; saveActionState(); renderAll(); };
            }

            async function initializeApp() {
                el.logDisplay.innerHTML = '';
                openLogModal();
                logMessage('앱 초기화 시작...');
                populateTimezones();
                loadActionState();
                await loadDataFromGoogleSheet();
                renderTableSelection();
                
                const lastHand = state.allHandNumbers.length > 0 ? Math.max(...state.allHandNumbers) : 0;
                state.actionState.handNumber = (lastHand + 1).toString();

                renderAll();
                setupEventListeners();
                el.handNumberDisplay.textContent = `#${state.actionState.handNumber}`;
                el.smallBlindInput.value = formatNumber(state.actionState.smallBlind);
                el.bigBlindInput.value = formatNumber(state.actionState.bigBlind);
                el.bbAnteCheckbox.checked = state.actionState.hasBBAnte;
                
                if(timeUpdater) clearInterval(timeUpdater);
                timeUpdater = setInterval(updateTimeDisplay, 1000);
                updateTimeDisplay();

                logMessage('준비 완료!');
                setTimeout(closeLogModal, 1000);
            }

            initializeApp();
        });
    </script>
</body>
</html>
